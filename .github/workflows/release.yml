name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare:
    # Push events still need "[release]" in the commit message; a manual "Run workflow"
    # click from the Actions tab is already an explicit request, no tag needed for that.
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[release]')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      sha: ${{ steps.version.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # If src-tauri/tauri.conf.json's version is already tagged (forgot to bump it
      # before pushing with [release]), auto-bump the patch number until we find one
      # that isn't tagged yet, and commit that bump back to master ourselves — so
      # a forgotten bump never blocks the release, only delays it by one patch.
      - name: Auto-bump version if already released
        id: version
        run: |
          set -euo pipefail
          CURRENT=$(jq -r .version src-tauri/tauri.conf.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          VERSION="$CURRENT"
          while git ls-remote --tags origin | grep -q "refs/tags/v${VERSION}$"; do
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          done

          if [ "$VERSION" != "$CURRENT" ]; then
            echo "v$CURRENT is already released, bumping to v$VERSION"
            for FILE in package.json src-tauri/tauri.conf.json; do
              jq --arg v "$VERSION" '.version = $v' "$FILE" > "$FILE.tmp"
              mv "$FILE.tmp" "$FILE"
            done
            sed -i "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
            git commit -m "chore: bump version to $VERSION (auto, previous version already released)"
            git push origin HEAD:master
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build-desktop:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file \
            libssl-dev \
            libxdo-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libasound2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> src-tauri/target

      - run: npm ci

      - name: Build app bundles
        run: npm run tauri build

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.AppImage
          if-no-files-found: error

  build-android:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> src-tauri/target

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager --install "ndk;28.2.13676358"

      - name: Set NDK_HOME
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> "$GITHUB_ENV"

      - run: npm ci

      # Populates src-tauri/gen/android/keystore.properties (gitignored) from repo
      # secrets, which app/build.gradle.kts picks up automatically for release
      # signing. If the secret isn't set yet, this is skipped and Gradle just
      # produces an unsigned release APK instead of failing the build.
      - name: Set up release signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "No ANDROID_KEYSTORE_BASE64 secret set — building an unsigned release APK."
            exit 0
          fi
          KEYSTORE_PATH="$GITHUB_WORKSPACE/src-tauri/gen/android/release.keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          cat > src-tauri/gen/android/keystore.properties <<EOF
          storeFile=$KEYSTORE_PATH
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      # Real release build (optimized, R8-minified, stripped native libs) instead of
      # debug, split per ABI instead of one universal APK bundling all 4 architectures
      # into a single file — that combination was making release downloads ~500MB for
      # something most phones only need about an eighth of.
      - name: Build release APKs (split per ABI)
        run: npm run tauri android build -- --split-per-abi --apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

  publish:
    needs: [prepare, build-desktop, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: artifacts/**/*
