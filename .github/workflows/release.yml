name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare:
    # Push events still need "[release]" in the commit message; a manual "Run workflow"
    # click from the Actions tab is already an explicit request, no tag needed for that.
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[release]')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      sha: ${{ steps.version.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # If src-tauri/tauri.conf.json's version is already tagged (forgot to bump it
      # before pushing with [release]), auto-bump the patch number until we find one
      # that isn't tagged yet, and commit that bump back to master ourselves — so
      # a forgotten bump never blocks the release, only delays it by one patch.
      - name: Auto-bump version if already released
        id: version
        run: |
          set -euo pipefail
          CURRENT=$(jq -r .version src-tauri/tauri.conf.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          VERSION="$CURRENT"
          while git ls-remote --tags origin | grep -q "refs/tags/v${VERSION}$"; do
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          done

          if [ "$VERSION" != "$CURRENT" ]; then
            echo "v$CURRENT is already released, bumping to v$VERSION"
            for FILE in package.json src-tauri/tauri.conf.json; do
              jq --arg v "$VERSION" '.version = $v' "$FILE" > "$FILE.tmp"
              mv "$FILE.tmp" "$FILE"
            done
            sed -i "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
            git commit -m "chore: bump version to $VERSION (auto, previous version already released)"
            git push origin HEAD:master
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build-desktop:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file \
            libssl-dev \
            libxdo-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libasound2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> src-tauri/target

      - run: npm ci

      - name: Build app bundles
        run: npm run tauri build

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.AppImage
          if-no-files-found: error

  build-android:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> src-tauri/target

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      # build-tools нужны не Gradle (он ставит свои), а шагу проверки подписи — apksigner.
      - name: Install NDK and build-tools
        run: sdkmanager --install "ndk;28.2.13676358" "build-tools;34.0.0"

      - name: Set NDK_HOME
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> "$GITHUB_ENV"

      - run: npm ci

      # Populates src-tauri/gen/android/keystore.properties (gitignored) from repo
      # secrets, which app/build.gradle.kts picks up automatically for release signing.
      # Missing secrets are a hard failure on purpose: without them Gradle silently falls
      # back to the auto-generated debug key, and CI regenerates that key on every run —
      # so each release ended up signed by a *different* throwaway certificate. Android
      # rejects those installs ("проблема с подписью") and refuses to upgrade over a
      # previously installed build, which is exactly what shipped through v0.2.5.
      - name: Set up release signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 не задан. Релизный APK нельзя подписывать отладочным ключом — такой пакет не ставится и не обновляется. См. README, раздел про ключ подписи Android."
            exit 1
          fi
          KEYSTORE_PATH="$GITHUB_WORKSPACE/src-tauri/gen/android/release.keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          cat > src-tauri/gen/android/keystore.properties <<EOF
          storeFile=$KEYSTORE_PATH
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      # Two builds, because both kinds of APK are needed:
      #   * universal — все 4 ABI в одном файле. Скачивается вслепую и ставится куда угодно;
      #     без него единственным выбором были файлы вида app-x86_64-release.apk, и на
      #     обычном телефоне это INSTALL_FAILED_NO_MATCHING_ABIS («пакет содержит код,
      #     несовместимый с CPU устройства»).
      #   * split-per-abi — тонкие сборки под одну архитектуру для тех, кому важен размер.
      # Второй прогон почти бесплатный: Rust-артефакты для всех четырёх целей уже собраны
      # первым, повторяется только Gradle.
      - name: Build universal release APK
        run: npm run tauri android build -- --apk

      - name: Build per-ABI release APKs
        run: npm run tauri android build -- --split-per-abi --apk

      # Имена от Gradle (app-arm64-release.apk) ничего не говорят тому, кто пришёл на
      # страницу релиза скачать приложение, — переименовываем в ABI, который реально
      # написан в настройках телефона, и ставим universal первым по алфавиту.
      - name: Collect and rename APKs
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          SRC=src-tauri/gen/android/app/build/outputs/apk
          OUT="$GITHUB_WORKSPACE/apk-out"
          mkdir -p "$OUT"

          find "$SRC" -name 'app-*-release.apk' -print0 | while IFS= read -r -d '' apk; do
            flavor=$(basename "$apk" .apk); flavor=${flavor#app-}; flavor=${flavor%-release}
            case "$flavor" in
              universal) suffix="universal" ;;
              arm64)     suffix="arm64-v8a" ;;
              arm)       suffix="armeabi-v7a" ;;
              x86)       suffix="x86" ;;
              x86_64)    suffix="x86_64" ;;
              *)         suffix="$flavor" ;;
            esac
            cp "$apk" "$OUT/Sonic_${VERSION}_android_${suffix}.apk"
          done

          # Отсутствие universal означало бы, что тот самый файл «ставится везде», ради
          # которого всё и затевалось, в релиз не попал — это ошибка, а не мелочь.
          test -f "$OUT/Sonic_${VERSION}_android_universal.apk"
          ls -la "$OUT"

      # Гарантия, что отладочный ключ больше не уедет в релиз незамеченным: apksigner
      # печатает владельца сертификата, и "CN=Android Debug" здесь недопустим.
      - name: Verify APK signature
        run: |
          set -euo pipefail
          APKSIGNER=$(ls "$ANDROID_HOME"/build-tools/*/apksigner | sort -V | tail -n 1)
          for apk in "$GITHUB_WORKSPACE"/apk-out/*.apk; do
            echo "=== $(basename "$apk")"
            CERTS=$("$APKSIGNER" verify --print-certs "$apk")
            echo "$CERTS"
            if echo "$CERTS" | grep -q "CN=Android Debug"; then
              echo "::error::$(basename "$apk") подписан отладочным ключом."
              exit 1
            fi
          done

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: apk-out/*.apk
          if-no-files-found: error

  publish:
    needs: [prepare, build-desktop, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: artifacts/**/*
