name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Юнит-тесты DSP/протокольного ядра (sonic-protocol) и аудио-пайплайна (sonic-audio)
  # без Android SDK/GUI и без звукового устройства (реально-аудио тесты за feature-флагом).
  # Полная сборка Tauri-приложения проверяется в health-check-* ниже.
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> src-tauri/target

      - name: Install ALSA dev headers (cpal build dep for sonic-audio)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Run DSP/protocol unit tests
        run: cargo test -p sonic-protocol -p sonic-audio --locked

  health-check-desktop:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file \
            libssl-dev \
            libxdo-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libasound2-dev \
            xvfb

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> src-tauri/target

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build debug binary
        run: cargo build --manifest-path src-tauri/Cargo.toml

      - name: Smoke test (Linux) - app launches and stays alive
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          xvfb-run -a bash -c '
            ./src-tauri/target/debug/tauri-app &
            PID=$!
            sleep 5
            if kill -0 $PID 2>/dev/null; then
              echo "OK: app still running after 5s"
              kill $PID
              exit 0
            else
              wait $PID
              CODE=$?
              echo "FAIL: app exited early with code $CODE"
              exit 1
            fi
          '

      - name: Smoke test (macOS) - app launches and stays alive
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          ./src-tauri/target/debug/tauri-app &
          PID=$!
          sleep 5
          if kill -0 $PID 2>/dev/null; then
            echo "OK: app still running after 5s"
            kill $PID
          else
            wait $PID
            CODE=$?
            echo "FAIL: app exited early with code $CODE"
            exit 1
          fi

      - name: Smoke test (Windows) - app launches and stays alive
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "src-tauri/target/debug/tauri-app.exe" -PassThru
          Start-Sleep -Seconds 5
          if (Get-Process -Id $proc.Id -ErrorAction SilentlyContinue) {
            Write-Output "OK: app still running after 5s"
            Stop-Process -Id $proc.Id -Force
          } else {
            Write-Output "FAIL: app exited early"
            exit 1
          }

  health-check-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Only the x86_64 target is needed here: the emulator used for the
      # smoke test below runs x86_64, and building the other 3 ABIs would
      # just waste CI time without adding to the health signal.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> src-tauri/target

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install NDK and platform tools
        run: sdkmanager --install "ndk;28.2.13676358" "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set NDK_HOME
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> "$GITHUB_ENV"

      - run: npm ci

      # Именно release, а не debug: релизная сборка отличается от отладочной R8-минификацией
      # (переименование классов ломает поиск по имени из JNI) и подписью — и раньше ни то,
      # ни другое не проверялось вообще, потому что на эмулятор ставился debug-APK.
      # Ключа подписи в CI нет, Gradle возьмёт отладочный — для эмулятора этого достаточно.
      - name: Build release APK (x86_64 only)
        run: npm run tauri android build -- --apk --target x86_64

      - name: Locate built APK
        id: apk
        run: |
          APK=$(find src-tauri/gen/android -name "*-release.apk" | head -n 1)
          echo "Found $APK"
          echo "path=$APK" >> "$GITHUB_OUTPUT"

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Boot emulator and verify app launches
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb install -r "${{ steps.apk.outputs.path }}"
            adb shell pm grant com.tuhlopuz.sonic android.permission.RECORD_AUDIO
            adb logcat -c
            adb shell monkey -p com.tuhlopuz.sonic -c android.intent.category.LAUNCHER 1
            sleep 15
            FAILED=0
            PID=$(adb shell pidof com.tuhlopuz.sonic | tr -d '\r'); if [ -z "$PID" ]; then echo "FAIL: app is not running on emulator"; FAILED=1; else echo "OK: app running with pid $PID"; fi
            # Живой процесс — ещё не «работает»: паника в Rust-потоке молча убивает только
            # этот поток, а список устройств при этом уже не приедет. Поэтому проверяем лог.
            if adb logcat -d | grep -qE "panicked at|android context was not initialized|UnsatisfiedLinkError"; then echo "FAIL: Rust panic / UnsatisfiedLinkError in logcat"; FAILED=1; fi
            # FATAL EXCEPTION в общем логе может быть и от чужого системного приложения —
            # засчитываем только тот стек, в котором упомянут наш пакет.
            if adb logcat -d | grep -A15 "FATAL EXCEPTION" | grep -q "com.tuhlopuz.sonic"; then echo "FAIL: fatal exception in our app"; FAILED=1; fi
            if [ "$FAILED" -ne 0 ]; then echo "--- logcat lines mentioning our package ---"; adb logcat -d | grep -iE "tuhlopuz.sonic|panicked|RustStdoutStderr"; echo "--- last 200 logcat lines (fallback) ---"; adb logcat -d | tail -n 200; exit 1; fi
